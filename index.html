<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哆啦A梦拯救哆啦美 - 完整结局版</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.55) 28%, rgba(240,248,255,0.2) 58%, rgba(220,240,255,0.1) 100%),
                linear-gradient(180deg, #eef8ff 0%, #dcefff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        #game-container {
            position: relative;
            width: 900px;
            height: 506px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.18);
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.65);
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
        }

        canvas { display: block; }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; transition: opacity 0.5s ease;
        }

        .hidden { display: none !important; }

        h1 { color: #0088cc; font-size: 36px; margin-bottom: 10px; text-shadow: 2px 2px 0px white; }
        p { color: #333; font-size: 18px; margin-bottom: 30px; text-align: center; line-height: 1.6; }

        button {
            padding: 12px 30px; font-size: 20px;
            background-color: #ffcc00; color: #d13d00;
            border: none; border-radius: 30px; cursor: pointer;
            font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
        }
        button:hover { background-color: #ffdb4d; transform: scale(1.05); }
        button:active { transform: scale(0.95); }

        #hud {
            position: absolute; top: 10px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 5; pointer-events: none;
        }
        .lives { font-size: 24px; color: #ff3333; text-shadow: 1px 1px 0 #fff; }
        .progress-container {
            flex-grow: 1; margin: 0 20px; height: 20px;
            background: rgba(255,255,255,0.6); border-radius: 10px;
            border: 2px solid #fff; position: relative; overflow: hidden;
        }
        #progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #ffcc00, #ff6600);
            border-radius: 8px; transition: width 0.1s linear;
        }
        .status-icons { font-size: 24px; width: 60px; text-align: right; }

        #enemy-overview {
            position: fixed;
            left: calc(50% - 780px);
            top: calc(50% - 178px);
            z-index: 6;
            width: 260px;
            padding: 12px;
            border-radius: 14px;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.96), rgba(244, 251, 255, 0.92));
            border: 1px solid rgba(121, 177, 223, 0.45);
            box-shadow: 0 10px 22px rgba(27, 76, 117, 0.18);
            color: #1f3344;
            font-size: 13px;
            line-height: 1.45;
            pointer-events: none;
            user-select: none;
        }

        #reward-overview {
            position: fixed;
            left: calc(50% + 520px);
            top: calc(50% - 178px);
            z-index: 6;
            width: 260px;
            padding: 12px;
            border-radius: 14px;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.96), rgba(244, 251, 255, 0.92));
            border: 1px solid rgba(121, 177, 223, 0.45);
            box-shadow: 0 10px 22px rgba(27, 76, 117, 0.18);
            color: #1f3344;
            font-size: 13px;
            line-height: 1.45;
            pointer-events: none;
            user-select: none;
        }

        #enemy-overview .title {
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
            color: #0b5b8d;
        }

        #reward-overview .title {
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
            color: #0b5b8d;
        }

        #enemy-overview-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #reward-overview-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .enemy-card {
            border: 1px solid rgba(121, 177, 223, 0.35);
            border-radius: 10px;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.85);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        .enemy-card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            font-weight: 700;
            color: #0f3e5d;
        }

        .enemy-tag {
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 999px;
            background: #e6f3ff;
            color: #0b5b8d;
        }

        .enemy-dmg {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 8px;
            background: #ffe8e8;
            color: #c9302c;
        }

        @media (max-width: 1160px) {
            body {
                padding: 16px;
                align-items: flex-start;
            }

            #game-container {
                width: min(92vw, 900px);
                height: auto;
            }

            #gameCanvas {
                width: 100%;
                height: auto;
            }

            #enemy-overview {
                left: 50%;
                top: calc(50% + 245px);
                transform: translateX(-50%);
                width: min(92vw, 760px);
                pointer-events: auto;
            }

            #reward-overview {
                left: 50%;
                top: calc(50% + 415px);
                transform: translateX(-50%);
                width: min(92vw, 760px);
                pointer-events: auto;
            }

            #enemy-overview-content {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 8px;
            }

            #reward-overview-content {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 8px;
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div id="lives-display" class="lives">❤️❤️❤️</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="status-display" class="status-icons"></div>
    </div>

    <canvas id="gameCanvas" width="900" height="506"></canvas>

    <div id="start-screen" class="overlay">
        <h1>🚁 哆啦A梦天空跑酷</h1>
        <p>胖虎的遥控飞机带走了哆啦美！<br>
        <strong>使用键盘【上下左右】或【W, A, S, D】控制移动。</strong><br>
        躲避障碍，吃铜锣烧加速，收集竹蜻蜓获得护盾！</p>
        <button id="start-btn">开始游戏</button>
    </div>

    <div id="game-over-screen" class="overlay hidden">
        <h1 style="color: #e60000;">竹蜻蜓没电了...</h1>
        <p>哆啦A梦慢慢飘落，没能追上飞机。</p>
        <button id="restart-btn-lose">再来一次</button>
    </div>

    <div id="win-screen" class="overlay hidden">
        <h1 style="color: #ff9900;">🎉 救援成功！ 🎉</h1>
        <p>空气炮精准命中！大家安全接住了哆啦美！</p>
        <button id="restart-btn-win">再玩一次</button>
    </div>
</div>

<aside id="enemy-overview" aria-hidden="true">
    <div class="title">敌人图鉴</div>
    <div id="enemy-overview-content"></div>
</aside>

<aside id="reward-overview" aria-hidden="true">
    <div class="title">奖励物图鉴</div>
    <div id="reward-overview-content"></div>
</aside>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const doraemonImg = new Image();
    doraemonImg.src = '贴图/贴图/带着竹蜻蜓飞的哆啦A梦.png';

    const doraemonFallImg = new Image();
    doraemonFallImg.src = '贴图/贴图/竹蜻蜓没电掉落的哆啦A梦(1).png';

    const doraemonShootImg = new Image();
    doraemonShootImg.src = '贴图/贴图(2)/贴图/哆啦A梦发射空气弹.png';

    const doraemonSpaceImg = new Image();
    doraemonSpaceImg.src = '贴图/贴图(2)/贴图2/太空多啦.png';

    const doraemonSeaImg = new Image();
    doraemonSeaImg.src = '贴图/贴图(2)/贴图2/海底多啦.png';

    const friendsCatchImg = new Image();
    friendsCatchImg.src = '贴图/贴图/小伙伴伸手接(1).png';

    const doramiCapturedImg = new Image();
    doramiCapturedImg.src = '贴图/贴图/哆啦美被遥控飞机抓走.png';

    const skyBgImg = new Image();
    skyBgImg.src = '贴图/贴图(2)/贴图/天空.jpg';

    const seaBgImg = new Image();
    seaBgImg.src = '贴图/贴图三/海底.png';

    const spaceBgImg = new Image();
    spaceBgImg.src = '贴图/贴图三/海底背景，太空背景  ，血包 ，行星/太空2.png';

    const planet2Img = new Image();
    planet2Img.src = '贴图/贴图三/海底背景，太空背景  ，血包 ，行星/行星2.png';

    const starImg = new Image();
    starImg.src = '贴图/贴图/星星（透明底pdf）.png';

    const meteorImg = new Image();
    meteorImg.src = '贴图/贴图/陨石（透明底pdf.png';

    const fishImg1 = new Image();
    fishImg1.src = '贴图/贴图/上鱼.png';
    const fishImg2 = new Image();
    fishImg2.src = '贴图/贴图/鱼下.png';

    const sharkImg1 = new Image();
    sharkImg1.src = '贴图/贴图/鲨鱼上.png';
    const sharkImg2 = new Image();
    sharkImg2.src = '贴图/贴图/鲨鱼下.png';

    const birdImg1 = new Image();
    birdImg1.src = '贴图/贴图三/风筝，飞鸟，电线杆，铜锣烧/飞鸟1.png';
    const birdImg2 = new Image();
    birdImg2.src = '贴图/贴图三/风筝，飞鸟，电线杆，铜锣烧/飞鸟2.png';

    const poleImg = new Image();
    poleImg.src = '贴图/贴图三/风筝，飞鸟，电线杆，铜锣烧/电线杆.png';

    const kiteImg = new Image();
    kiteImg.src = '贴图/贴图三/风筝，飞鸟，电线杆，铜锣烧/风筝2.png';

    const dorayakiImg = new Image();
    dorayakiImg.src = '贴图/贴图三/风筝，飞鸟，电线杆，铜锣烧/铜锣烧.png';

    const healthPackImg = new Image();
    healthPackImg.src = '贴图/贴图三/海底背景，太空背景  ，血包 ，行星/血包.png';

    const shieldImg = new Image();
    shieldImg.src = '贴图/贴图三/风筝，飞鸟，电线杆，铜锣烧/盾牌.png';

    const helicopterImg = new Image();
    helicopterImg.src = '贴图/贴图(2)/贴图/飞机.png';

    const planeImg = new Image();
    planeImg.src = '贴图/贴图/遥控飞机.png';

    const doramiImg = new Image();
    doramiImg.src = '贴图/贴图/哆啦美.png';

    const anywhereDoorImg = new Image();
    anywhereDoorImg.src = '贴图/贴图(2)/贴图2/任意门.png';

    const alienImg = new Image();
    alienImg.src = '贴图/贴图(2)/贴图2/外星人.png';

    const backgroundMusic = new Audio('audio/魂狼-牧场物语 (8-bit ver.mp3');
    backgroundMusic.loop = true;
    backgroundMusic.volume = 0.5;
    backgroundMusic.preload = 'auto';

    const winSfx = new Audio('audio/游戏胜利音效-关卡完成-庆祝号角_爱给网_aigei_com.mp3');
    winSfx.volume = 0.7;
    winSfx.preload = 'auto';

    const loseSfx = new Audio('audio/错误、失败、失误、重试、不正确-错过-猜谜_爱给网_aigei_com.mp3');
    loseSfx.volume = 0.7;
    loseSfx.preload = 'auto';

    function playWinSfx() {
        winSfx.currentTime = 0;
        winSfx.play().catch(() => {});
    }

    function playLoseSfx() {
        loseSfx.currentTime = 0;
        loseSfx.play().catch(() => {});
    }

    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const winScreen = document.getElementById('win-screen');
    const progressBar = document.getElementById('progress-bar');
    const livesDisplay = document.getElementById('lives-display');
    const statusDisplay = document.getElementById('status-display');
    const enemyOverviewContent = document.getElementById('enemy-overview-content');
    const rewardOverviewContent = document.getElementById('reward-overview-content');

    const STATE = { START: 0, PLAYING: 1, ANIM_LOSE: 2, ANIM_WIN: 3, UI_GAMEOVER: 4, UI_WIN: 5 };
    let currentState = STATE.START;

    const LEVELS = {
        1: { name: '海底世界', background: 'sea', spawnPool: ['fish', 'shark'], doorPosition: { x: 700, y: 320 } },
        2: { name: '外太空', background: 'space', spawnPool: ['star', 'meteor', 'asteroid', 'alien'], doorPosition: { x: 700, y: 320 } },
        3: { name: '天空跑酷', background: 'sky', spawnPool: ['bird', 'pole', 'kite', 'plane'], doorPosition: { x: 700, y: 320 } }
    };

    const ENEMY_OVERVIEW_DATA = {
        1: [
            { icon: '🐟', name: '飞鱼', damage: '1格', tag: '游动' },
            { icon: '🦈', name: '鲨鱼', damage: '秒杀', tag: '高危' }
        ],
        2: [
            { icon: '⭐', name: '星星', damage: '1格', tag: '漂移' },
            { icon: '☄️', name: '陨石', damage: '1格', tag: '高速' },
            { icon: '🪨', name: '小行星', damage: '秒杀', tag: '撞击' },
            { icon: '👾', name: '外星人', damage: '1格', tag: '追击' }
        ],
        3: [
            { icon: '🦅', name: '飞鸟', damage: '1格', tag: '波动' },
            { icon: '🗼', name: '电线杆', damage: '1格', tag: '地形' },
            { icon: '🪁', name: '风筝', damage: '1格', tag: '摆动' },
            { icon: '✈️', name: '遥控机', damage: '秒杀', tag: '突进' }
        ]
    };

    const REWARD_OVERVIEW_DATA = [
        { icon: '🍩', name: '铜锣烧', effect: '+进度 800', tag: '加速' },
        { icon: '🛡️', name: '护盾', effect: '抵挡 1 次受伤', tag: '防御' },
        { icon: '➕', name: '血包', effect: '回复 1 格血', tag: '每关随机1次' }
    ];

    let currentLevel = 1;
    let frames = 0;
    let progress = 0;
    let lastTime = 0;
    const TARGET_FPS = 60;
    const FRAME_TIME = 1000 / TARGET_FPS;
    const MAX_PROGRESS = 15000;
    const SCROLL_SPEED = 7.0;
    const OBSTACLE_SPEED_BASE = 6.0;
    const OBSTACLE_SPEED_VARIATION = 1.2;
    const OBSTACLE_FAST_BONUS = 2.2;
    const PLAYER_SPEED_START = 10.0;
    const PLAYER_SPEED_END = 15.0;
    const WIN_ANIM_SPEED_SCALE = 0.65;
    const ALIEN_CHASE_FRAMES = 300;

    let obstacles = [];
    let powerUps = [];
    let floatingTexts = [];
    let levelGateOpen = false;
    let levelGate = null;
    let healthPackSpawned = false;
    let healthPackSpawnProgress = 0;

    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };

    let animPhase = 0;
    let animTimer = 0;
    let animData = {};

    function createFloatingText(text, x, y, color) {
        floatingTexts.push({ text, x, y, color, life: 30 });
    }

    function drawFloatingTexts() {
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            const ft = floatingTexts[i];
            ctx.fillStyle = ft.color;
            ctx.font = 'bold 20px Arial';
            ctx.globalAlpha = ft.life / 30;
            ctx.fillText(ft.text, ft.x, ft.y);
            ctx.globalAlpha = 1.0;
            ft.y -= 1;
            ft.life--;
            if (ft.life <= 0) floatingTexts.splice(i, 1);
        }
    }

    function renderEnemyOverview() {
        const enemies = ENEMY_OVERVIEW_DATA[currentLevel] || [];
        if (!enemyOverviewContent) return;

        enemyOverviewContent.innerHTML = enemies.map((enemy) => `
            <div class="enemy-card">
                <div class="enemy-card-head">
                    <span>${enemy.icon} ${enemy.name}</span>
                    <span class="enemy-tag">${enemy.tag}</span>
                </div>
                <span class="enemy-dmg">伤害: ${enemy.damage}</span>
            </div>
        `).join('');
    }

    function renderRewardOverview() {
        if (!rewardOverviewContent) return;

        rewardOverviewContent.innerHTML = REWARD_OVERVIEW_DATA.map((reward) => `
            <div class="enemy-card">
                <div class="enemy-card-head">
                    <span>${reward.icon} ${reward.name}</span>
                    <span class="enemy-tag">${reward.tag}</span>
                </div>
                <span class="enemy-dmg" style="background:#e8fff0;color:#1b8f3a;">效果: ${reward.effect}</span>
            </div>
        `).join('');
    }

    const player = {
        x: 150,
        y: 200,
        radius: 25,
        moveSpeed: PLAYER_SPEED_START,
        lives: 3,
        hasShield: false,
        isInvincible: false,
        invincibleTimer: 0,
        hasPropeller: true,

        draw() {
            if (this.isInvincible && Math.floor(frames / 5) % 2 === 0 && currentState === STATE.PLAYING) return;

            const useSkySkin = true;

            if (this.hasShield) {
                if (useSkySkin && shieldImg.complete) {
                    const shieldSize = (this.radius + 16) * 2;
                    ctx.save();
                    ctx.globalAlpha = 0.7;
                    ctx.drawImage(shieldImg, this.x - shieldSize / 2, this.y - shieldSize / 2, shieldSize, shieldSize);
                    ctx.restore();
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 8, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 215, 0, 0.4)';
                    ctx.fill();
                }
            }

            const isFalling = currentState === STATE.ANIM_LOSE;
            const isShooting = currentState === STATE.ANIM_WIN && animPhase === 1 && animData.cannonActive;
            let currentImg = doraemonImg;
            if (!isFalling && !isShooting) {
                if (currentLevel === 1 && doraemonSeaImg.complete) {
                    currentImg = doraemonSeaImg;
                } else if (currentLevel === 2 && doraemonSpaceImg.complete) {
                    currentImg = doraemonSpaceImg;
                }
            }
            if (isFalling) currentImg = doraemonFallImg;
            else if (isShooting) currentImg = doraemonShootImg;

            if (useSkySkin && currentImg.complete) {
                ctx.save();
                ctx.translate(this.x, this.y);
                const size = this.radius * 3.1;
                ctx.drawImage(currentImg, -size / 2, -size / 2, size, size);
                ctx.restore();
                return;
            }

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#0088cc';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(this.x + 5, this.y + 5, this.radius * 0.7, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(this.x + 15, this.y - 5, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#ff0000';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(this.x + 10, this.y - 5, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(this.x + 5, this.y + 5, 8, 0, Math.PI);
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(this.x, this.y + this.radius - 5, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#ffcc00';
            ctx.fill();

            if (this.hasPropeller) {
                ctx.fillStyle = '#e6b800';
                ctx.fillRect(this.x - 2, this.y - this.radius - 8, 4, 8);
                ctx.fillRect(this.x - 12, this.y - this.radius - 10, 24, 3);
            }
        },

        update() {
            if (currentState !== STATE.PLAYING) return;

            let dx = 0;
            let dy = 0;
            if (keys.ArrowUp || keys.w) dy -= this.moveSpeed;
            if (keys.ArrowDown || keys.s) dy += this.moveSpeed;
            if (keys.ArrowLeft || keys.a) dx -= this.moveSpeed;
            if (keys.ArrowRight || keys.d) dx += this.moveSpeed;

            this.x += dx;
            this.y += dy;

            if (this.x - this.radius < 0) this.x = this.radius;
            if (this.x + this.radius > canvas.width) this.x = canvas.width - this.radius;
            if (this.y - this.radius < 0) this.y = this.radius;
            if (this.y + this.radius > canvas.height) this.y = canvas.height - this.radius;

            if (this.isInvincible) {
                this.invincibleTimer--;
                if (this.invincibleTimer <= 0) this.isInvincible = false;
            }

            statusDisplay.innerHTML = this.hasShield ? '🛡️' : '';
        },

        hit() {
            if (this.isInvincible) return;

            if (this.hasShield) {
                this.hasShield = false;
                createFloatingText('护盾抵挡!', this.x, this.y, '#ffd700');
            } else {
                this.lives--;
                updateLivesDisplay();
                progress = Math.max(0, progress - 500);
                createFloatingText('哎呀!', this.x, this.y, '#ff0000');

                if (this.lives <= 0) {
                    triggerLoseAnimation();
                    playLoseSfx();
                    if (!backgroundMusic.paused) backgroundMusic.pause();
                    return;
                }
            }
            this.isInvincible = true;
            this.invincibleTimer = 60;
        }
    };

    class Obstacle {
        constructor(type = null) {
            this.x = canvas.width;
            this.type = type || LEVELS[currentLevel].spawnPool[Math.floor(Math.random() * LEVELS[currentLevel].spawnPool.length)];
            this.width = 40;
            this.height = 40;
            this.speed = OBSTACLE_SPEED_BASE + Math.random() * OBSTACLE_SPEED_VARIATION;
            this.angle = 0;
            this.birdState = 1;
            this.sharkState = 1;
            this.chaseFactor = 0;
            this.chaseTimer = 0;
            this.exploding = false;
            this.explodeLife = 0;

            switch (this.type) {
                case 'fish':
                    this.y = 50 + Math.random() * (canvas.height - 100);
                    this.emoji = '🐟';
                    this.fishState = Math.floor(Math.random() * 2) + 1;
                    break;
                case 'shark':
                    this.y = 50 + Math.random() * (canvas.height - 100);
                    this.width = 120;
                    this.height = 80;
                    this.emoji = '🦈';
                    this.sharkState = Math.floor(Math.random() * 2) + 1;
                    this.speed = OBSTACLE_SPEED_BASE + OBSTACLE_FAST_BONUS;
                    break;
                case 'star':
                    this.y = 50 + Math.random() * (canvas.height - 100);
                    this.emoji = '⭐';
                    break;
                case 'meteor':
                    this.y = 50 + Math.random() * (canvas.height - 100);
                    this.emoji = '☄️';
                    break;
                case 'asteroid':
                    this.y = 50 + Math.random() * (canvas.height - 100);
                    this.width = 50;
                    this.height = 50;
                    this.emoji = '🪨';
                    this.speed = OBSTACLE_SPEED_BASE + OBSTACLE_FAST_BONUS;
                    break;
                case 'alien':
                    this.y = 50 + Math.random() * (canvas.height - 100);
                    this.width = 52;
                    this.height = 52;
                    this.emoji = '👾';
                    this.speed = OBSTACLE_SPEED_BASE + 0.9;
                    this.chaseFactor = 0.09;
                    this.chaseTimer = ALIEN_CHASE_FRAMES;
                    break;
                case 'bird':
                    this.y = 50 + Math.random() * (canvas.height - 100);
                    this.emoji = '🦅';
                    break;
                case 'pole':
                    this.width = 30;
                    this.height = 100 + Math.random() * 100;
                    this.y = canvas.height - this.height;
                    this.emoji = '🗼';
                    break;
                case 'kite':
                    this.width = 40;
                    this.height = 80 + Math.random() * 50;
                    this.y = 0;
                    this.emoji = '🪁';
                    this.baseY = 0;
                    this.angle = Math.random() * Math.PI * 2;
                    break;
                case 'plane':
                    this.y = Math.max(20, Math.min(canvas.height - 20, player.y + (Math.random() * 100 - 50)));
                    this.speed = OBSTACLE_SPEED_BASE + OBSTACLE_FAST_BONUS;
                    this.emoji = '✈️';
                    break;
            }
        }

        draw() {
            const centerX = this.x + this.width / 2;
            const centerY = this.y + this.height / 2;

            if (currentLevel === 3 && this.type === 'bird') {
                const currentBirdImg = this.birdState === 1 ? birdImg1 : birdImg2;
                if (currentBirdImg.complete) {
                    const size = this.width * 1.5;
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.drawImage(currentBirdImg, -size / 2, -size / 2, size, size);
                    ctx.restore();
                    return;
                }
            }

            if (currentLevel === 3 && this.type === 'pole' && poleImg.complete) {
                ctx.save();
                const scale = this.height / poleImg.height;
                const width = poleImg.width * scale;
                ctx.drawImage(poleImg, this.x + (this.width - width) / 2, this.y, width, this.height);
                ctx.restore();
                return;
            }

            if (currentLevel === 3 && this.type === 'kite' && kiteImg.complete) {
                ctx.save();
                const scale = this.height / kiteImg.height;
                const width = kiteImg.width * scale;
                ctx.drawImage(kiteImg, this.x + (this.width - width) / 2, this.y, width, this.height);
                ctx.restore();
                return;
            }

            if (currentLevel === 3 && this.type === 'plane' && helicopterImg.complete) {
                ctx.save();
                const scale = this.height / helicopterImg.height;
                const width = helicopterImg.width * scale;
                ctx.drawImage(helicopterImg, this.x + (this.width - width) / 2, this.y, width, this.height);
                ctx.restore();
                return;
            }

            if (this.type === 'fish') {
                const currentFishImg = this.fishState === 1 ? fishImg1 : fishImg2;
                if (currentFishImg.complete) {
                    const size = 64;
                    ctx.save();
                    ctx.drawImage(currentFishImg, centerX - size / 2, centerY - size / 2, size, size);
                    ctx.restore();
                    return;
                }

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.fillStyle = '#ff6b6b';
                ctx.beginPath();
                ctx.ellipse(0, 0, 20, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(15, 0);
                ctx.lineTo(25, -8);
                ctx.lineTo(25, 8);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(-8, -3, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(-6, -3, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                return;
            }

            if (this.type === 'shark') {
                const currentSharkImg = this.sharkState === 1 ? sharkImg1 : sharkImg2;
                if (currentSharkImg.complete) {
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.drawImage(currentSharkImg, -this.width / 2, -this.height / 2, this.width, this.height);
                    ctx.restore();
                    return;
                }

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.fillStyle = '#4a90d9';
                ctx.beginPath();
                ctx.ellipse(0, 0, 30, 18, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(25, 0);
                ctx.lineTo(40, -12);
                ctx.lineTo(40, 12);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(0, -15);
                ctx.lineTo(-5, -25);
                ctx.lineTo(5, -15);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(-12, -5, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(-10, -5, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(-5, 8);
                ctx.lineTo(-3, 12);
                ctx.lineTo(-1, 8);
                ctx.fill();
                ctx.restore();
                return;
            }

            if (this.type === 'star') {
                if (starImg.complete) {
                    const targetSize = 104;
                    const scale = targetSize / Math.max(starImg.naturalWidth || 1, starImg.naturalHeight || 1);
                    const drawWidth = starImg.naturalWidth * scale;
                    const drawHeight = starImg.naturalHeight * scale;
                    ctx.save();
                    ctx.drawImage(starImg, centerX - drawWidth / 2, centerY - drawHeight / 2, drawWidth, drawHeight);
                    ctx.restore();
                    return;
                }

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * 15, -Math.sin((18 + i * 72) * Math.PI / 180) * 15);
                    ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * 7, -Math.sin((54 + i * 72) * Math.PI / 180) * 7);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
                return;
            }

            if (this.type === 'meteor') {
                if (meteorImg.complete) {
                    const targetSize = 62;
                    const scale = targetSize / Math.max(meteorImg.naturalWidth || 1, meteorImg.naturalHeight || 1);
                    const drawWidth = meteorImg.naturalWidth * scale;
                    const drawHeight = meteorImg.naturalHeight * scale;
                    ctx.save();
                    ctx.drawImage(meteorImg, centerX - drawWidth / 2, centerY - drawHeight / 2, drawWidth, drawHeight);
                    ctx.restore();
                    return;
                }

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.fillStyle = '#ff9500';
                ctx.beginPath();
                ctx.ellipse(0, 0, 18, 10, Math.PI / 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255, 149, 0, 0.5)';
                ctx.beginPath();
                ctx.moveTo(18, -5);
                ctx.lineTo(35, -10);
                ctx.lineTo(35, 0);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
                return;
            }

            if (this.type === 'asteroid') {
                if (planet2Img.complete) {
                    const size = this.width * 1.2;
                    ctx.save();
                    ctx.drawImage(planet2Img, this.x + (this.width - size) / 2, this.y + (this.height - size) / 2, size, size);
                    ctx.restore();
                    return;
                }

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.fillStyle = '#8b7355';
                ctx.beginPath();
                ctx.arc(0, 0, 22, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#6b5344';
                ctx.beginPath();
                ctx.arc(-5, -5, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(8, 3, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(-3, 8, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                return;
            }

            if (this.type === 'alien') {
                if (this.exploding) {
                    const blastProgress = 1 - (this.explodeLife / 18);
                    const blastR = 10 + blastProgress * 26;
                    ctx.save();
                    ctx.globalAlpha = this.explodeLife / 18;
                    ctx.fillStyle = 'rgba(255, 180, 60, 0.95)';
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, blastR, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255, 80, 80, 0.9)';
                    ctx.beginPath();
                    ctx.arc(centerX + 6, centerY - 4, blastR * 0.55, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    return;
                }

                if (alienImg.complete && alienImg.naturalWidth > 0 && alienImg.naturalHeight > 0) {
                    const scale = Math.min(this.width / alienImg.naturalWidth, this.height / alienImg.naturalHeight);
                    const drawWidth = alienImg.naturalWidth * scale;
                    const drawHeight = alienImg.naturalHeight * scale;
                    ctx.save();
                    ctx.drawImage(
                        alienImg,
                        centerX - drawWidth / 2,
                        centerY - drawHeight / 2,
                        drawWidth,
                        drawHeight
                    );
                    ctx.restore();
                    return;
                }

                ctx.save();
                ctx.translate(centerX, centerY);

                ctx.fillStyle = '#7f8c8d';
                ctx.beginPath();
                ctx.ellipse(0, 8, 22, 10, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'rgba(120, 220, 255, 0.55)';
                ctx.beginPath();
                ctx.arc(0, 2, 12, Math.PI, 0);
                ctx.lineTo(12, 2);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#9bff6a';
                ctx.beginPath();
                ctx.arc(0, 0, 7, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#1f2d3d';
                ctx.beginPath();
                ctx.arc(-3, -1, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(3, -1, 1.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffd166';
                ctx.beginPath();
                ctx.arc(-12, 9, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(0, 10, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(12, 9, 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
                return;
            }

            if (currentLevel === 3 && this.type === 'plane' && !helicopterImg.complete) {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.fillStyle = '#3498db';
                ctx.beginPath();
                ctx.ellipse(0, 0, 25, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(-5, 0);
                ctx.lineTo(-15, -20);
                ctx.lineTo(5, -20);
                ctx.lineTo(10, 0);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(-20, 0);
                ctx.lineTo(-25, -15);
                ctx.lineTo(-15, -5);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
                return;
            }

            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            let drawY = this.y + this.height / 2;
            if (this.type === 'kite') drawY = this.y + this.height - 20;
            ctx.fillText(this.emoji, this.x + this.width / 2, drawY);
        }

        update() {
            this.x -= this.speed;
            if (this.type === 'fish' || this.type === 'star' || this.type === 'meteor' || this.type === 'bird' || this.type === 'shark') {
                this.y += Math.sin(this.angle) * 3;
                this.angle += 0.1;
            }
            if (this.type === 'fish') {
                this.fishState = Math.floor(frames / 60) % 2 === 0 ? 1 : 2;
            }
            if (this.type === 'shark') {
                this.sharkState = Math.floor(frames / 60) % 2 === 0 ? 1 : 2;
            }
            if (this.type === 'kite') {
                this.y = this.baseY + Math.sin(this.angle) * 12;
                this.y = Math.max(0, Math.min(canvas.height - this.height, this.y));
                this.angle += 0.08;
            }
            if (this.type === 'alien') {
                if (this.exploding) {
                    this.explodeLife--;
                } else if (this.chaseTimer > 0) {
                    const targetY = player.y - this.height / 2;
                    this.y += (targetY - this.y) * this.chaseFactor;
                    this.y = Math.max(0, Math.min(canvas.height - this.height, this.y));
                    this.chaseTimer--;
                    if (this.chaseTimer <= 0) {
                        this.exploding = true;
                        this.explodeLife = 18;
                        this.speed = 0;
                        createFloatingText('自爆!', this.x, this.y - 10, '#ff7733');
                    }
                }
            }
            if (this.type === 'bird') {
                this.birdState = Math.floor(frames / 60) % 2 === 0 ? 1 : 2;
            }
        }
    }

    class PowerUp {
        constructor(type = null) {
            this.x = canvas.width;
            this.y = 50 + Math.random() * (canvas.height - 100);
            this.radius = 15;
            this.speed = SCROLL_SPEED;
            if (type !== null) {
                this.type = type;
            } else {
                this.type = Math.random() > 0.7 ? 1 : 0;
            }
        }

        draw() {
            if (this.type === 0 && dorayakiImg.complete) {
                const size = 40;
                ctx.drawImage(dorayakiImg, this.x - size / 2, this.y - size / 2, size, size);
                return;
            }

            if (this.type === 1 && shieldImg.complete) {
                const size = 42;
                ctx.drawImage(shieldImg, this.x - size / 2, this.y - size / 2, size, size);
                return;
            }

            if (this.type === 2 && healthPackImg.complete) {
                const size = 42;
                ctx.drawImage(healthPackImg, this.x - size / 2, this.y - size / 2, size, size);
                return;
            }

            if (this.type === 0) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = '#d4a574';
                ctx.beginPath();
                ctx.arc(0, 0, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#8b4513';
                ctx.beginPath();
                ctx.arc(0, 0, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            } else if (this.type === 1) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.beginPath();
                ctx.arc(0, 0, 18, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 215, 0, 0.6)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.9)';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.restore();
            } else if (this.type === 2) {
                ctx.save();
                ctx.translate(this.x, this.y);
                // Draw health pack with cross
                ctx.fillStyle = '#00cc44';
                ctx.beginPath();
                ctx.arc(0, 0, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(-12, -3, 24, 6);
                ctx.fillRect(-3, -12, 6, 24);
                ctx.restore();
            }
        }

        update() {
            this.x -= this.speed;
        }
    }

    function initLevel(levelNum) {
        currentLevel = levelNum;
        progress = 0;
        obstacles = [];
        powerUps = [];
        levelGateOpen = false;
        levelGate = null;
        healthPackSpawned = false;
        healthPackSpawnProgress = 2500 + Math.random() * 9000;
        updateProgressBar();
        renderEnemyOverview();
        renderRewardOverview();
    }

    function getDoorRenderSize() {
        const baseWidth = 64;
        const baseHeight = 96;
        const scaleMultiplier = 4;

        if (anywhereDoorImg.complete && anywhereDoorImg.naturalWidth > 0 && anywhereDoorImg.naturalHeight > 0) {
            const fitScale = Math.min(baseWidth / anywhereDoorImg.naturalWidth, baseHeight / anywhereDoorImg.naturalHeight);
            const scale = fitScale * scaleMultiplier;
            return {
                width: anywhereDoorImg.naturalWidth * scale,
                height: anywhereDoorImg.naturalHeight * scale
            };
        }

        return {
            width: baseWidth * scaleMultiplier,
            height: baseHeight * scaleMultiplier
        };
    }

    function drawDoor(door) {
        if (anywhereDoorImg.complete) {
            ctx.save();
            ctx.drawImage(anywhereDoorImg, door.x, door.y, door.width, door.height);
            ctx.restore();
            return;
        }

        ctx.save();
        ctx.translate(door.x, door.y);
        ctx.fillStyle = 'rgba(255, 132, 179, 0.95)';
        ctx.fillRect(0, 0, door.width, door.height);
        ctx.fillStyle = '#ffd8e8';
        ctx.fillRect(6, 6, door.width - 12, door.height - 12);
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(door.width / 2, door.height / 2, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff88bb';
        ctx.beginPath();
        ctx.arc(door.width / 2, door.height / 2, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#f6c000';
        ctx.beginPath();
        ctx.arc(door.width - 12, door.height / 2, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    function openLevelGate() {
        if (levelGateOpen) return;
        levelGateOpen = true;
        obstacles = [];
        powerUps = [];
        const doorSize = getDoorRenderSize();
        levelGate = {
            x: LEVELS[currentLevel].doorPosition.x,
            y: LEVELS[currentLevel].doorPosition.y,
            width: doorSize.width,
            height: doorSize.height
        };
        createFloatingText('任意门出现!', levelGate.x + 20, levelGate.y - 18, '#ff66aa');
    }

    function advanceLevel() {
        if (currentLevel < 3) {
            playWinSfx();
            initLevel(currentLevel + 1);
            createFloatingText(`进入关卡 ${currentLevel}!`, canvas.width / 2 - 60, canvas.height / 2, '#00cc44');
        } else {
            triggerWinAnimation();
        }
    }

    function drawBackground() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (currentLevel === 1 && seaBgImg.complete) {
            const bgOffset = (frames * 0.8) % canvas.width;
            ctx.drawImage(seaBgImg, -bgOffset, 0, canvas.width, canvas.height);
            ctx.drawImage(seaBgImg, canvas.width - bgOffset, 0, canvas.width, canvas.height);
        } else if (currentLevel === 2 && spaceBgImg.complete) {
            const bgOffset = (frames * 0.7) % canvas.width;
            ctx.drawImage(spaceBgImg, -bgOffset, 0, canvas.width, canvas.height);
            ctx.drawImage(spaceBgImg, canvas.width - bgOffset, 0, canvas.width, canvas.height);
        } else if (currentLevel === 3 && skyBgImg.complete) {
            const bgOffset = (frames * 1) % canvas.width;
            ctx.drawImage(skyBgImg, -bgOffset, 0, canvas.width, canvas.height);
            ctx.drawImage(skyBgImg, canvas.width - bgOffset, 0, canvas.width, canvas.height);
            return;
        } else if (currentLevel === 1) {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#006994');
            gradient.addColorStop(1, '#001e3b');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        if (currentLevel === 1) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            for (let i = 0; i < 10; i++) {
                const bubbleX = (frames * 0.5 + i * 100) % canvas.width;
                const bubbleY = canvas.height - (frames * 0.3 + i * 50) % canvas.height;
                ctx.beginPath();
                ctx.arc(bubbleX, bubbleY, 5 + i, 0, Math.PI * 2);
                ctx.fill();
            }
        } else if (currentLevel === 2) {
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 20; i++) {
                const starX = (frames * 0.2 + i * 80) % canvas.width;
                const starY = 50 + (i * 37) % (canvas.height - 100);
                ctx.beginPath();
                ctx.arc(starX, starY, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    function checkCollision(circle, rect) {
        const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
        const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.height));
        const distanceX = circle.x - closestX;
        const distanceY = circle.y - closestY;
        return (distanceX * distanceX) + (distanceY * distanceY) < (circle.radius * circle.radius);
    }

    function checkCircleCollision(c1, c2) {
        const dx = c1.x - c2.x;
        const dy = c1.y - c2.y;
        return Math.sqrt(dx * dx + dy * dy) < (c1.radius + c2.radius);
    }

    function triggerWinAnimation() {
        currentState = STATE.ANIM_WIN;
        animPhase = 0;
        animTimer = 0;
        obstacles = [];
        powerUps = [];
        levelGateOpen = false;
        levelGate = null;
        animData = {
            planeX: canvas.width,
            planeY: 150,
            doramiX: canvas.width,
            doramiY: 180,
            ropeBroken: false,
            cannonActive: false,
            cannonX: 0,
            cannonY: 0,
            friendsY: canvas.height + 50
        };
    }

    function triggerLoseAnimation() {
        currentState = STATE.ANIM_LOSE;
        animPhase = 0;
        animTimer = 0;
        player.hasPropeller = false;
    }

    function updateWinAnimation() {
        animTimer++;

        if (animPhase === 0) {
            player.x += (150 - player.x) * 0.05 * WIN_ANIM_SPEED_SCALE;
            player.y += (180 - player.y) * 0.05 * WIN_ANIM_SPEED_SCALE;
            animData.planeX -= 2 * WIN_ANIM_SPEED_SCALE;
            animData.doramiX -= 2 * WIN_ANIM_SPEED_SCALE;
            if (animData.planeX <= 550) animPhase = 1;
        } else if (animPhase === 1) {
            if (!animData.cannonActive) {
                animData.cannonActive = true;
                animData.cannonX = player.x + player.radius;
                animData.cannonY = player.y;
                playWinSfx();
                if (!backgroundMusic.paused) backgroundMusic.pause();
            }
            animData.cannonX += 15 * WIN_ANIM_SPEED_SCALE;
            if (animData.cannonX > animData.planeX - 20) {
                animData.cannonActive = false;
                animData.ropeBroken = true;
                animPhase = 2;
                createFloatingText('砰！', animData.planeX, animData.planeY, '#fff');
            }
        } else if (animPhase === 2) {
            animData.planeX += 5 * WIN_ANIM_SPEED_SCALE;
            animData.planeY -= 5 * WIN_ANIM_SPEED_SCALE;
            player.y += 3 * WIN_ANIM_SPEED_SCALE;
            animData.doramiY += 3 * WIN_ANIM_SPEED_SCALE;
            if (animData.friendsY > canvas.height - 40) animData.friendsY -= 2 * WIN_ANIM_SPEED_SCALE;
            if (player.y > canvas.height - 60) {
                animData.cannonActive = false;
                currentState = STATE.UI_WIN;
                winScreen.classList.remove('hidden');
            }
        }
    }

    function drawWinAnimation() {
        player.draw();

        if (animPhase === 2) {
            if (friendsCatchImg.complete) {
                ctx.drawImage(friendsCatchImg, 200, animData.friendsY - 100, 300, 200);
            } else {
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('👦👓 👦🤜 👦🦊', 350, animData.friendsY);
            }
        }

        if (animPhase === 2) {
            if (planeImg.complete) {
                const planeSize = 60;
                ctx.drawImage(planeImg, animData.planeX - planeSize / 2, animData.planeY - planeSize / 2, planeSize, planeSize);
            } else {
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('✈️', animData.planeX, animData.planeY);
            }

            if (doramiImg.complete) {
                const doramiSize = player.radius * 2.5;
                ctx.drawImage(doramiImg, animData.doramiX - doramiSize / 2, animData.doramiY - doramiSize / 2, doramiSize, doramiSize);
            } else {
                ctx.beginPath();
                ctx.arc(animData.doramiX, animData.doramiY, 20, 0, Math.PI * 2);
                ctx.fillStyle = '#ffcc00';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(animData.doramiX + 3, animData.doramiY + 3, 14, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
            }
        } else {
            if (doramiCapturedImg.complete) {
                const doramiSize = player.radius * 2.5;
                ctx.drawImage(doramiCapturedImg, animData.planeX - doramiSize / 2, animData.planeY - doramiSize / 2, doramiSize, doramiSize);
            } else {
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('✈️', animData.planeX, animData.planeY);
            }
        }

        if (animPhase !== 2 && !animData.ropeBroken) {
            ctx.beginPath();
            ctx.moveTo(animData.planeX, animData.planeY + 10);
            ctx.lineTo(animData.doramiX, animData.doramiY - 20);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        if (animData.cannonActive) {
            ctx.beginPath();
            ctx.arc(animData.cannonX, animData.cannonY, 15, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.shadowColor = 'cyan';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    function updateLoseAnimation() {
        animTimer++;
        player.y += 1.5;
        if (player.y >= canvas.height - player.radius) {
            player.y = canvas.height - player.radius;
            currentState = STATE.UI_GAMEOVER;
            gameOverScreen.classList.remove('hidden');
        }
    }

    function drawLoseAnimation() {
        player.draw();
        ctx.font = '24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🪫💦', player.x, player.y - 40);
    }

    function initGame() {
        player.x = 150;
        player.y = 200;
        player.lives = 3;
        player.hasShield = false;
        player.isInvincible = false;
        player.hasPropeller = true;
        player.moveSpeed = PLAYER_SPEED_START;
        animData.cannonActive = false;

        for (const key in keys) keys[key] = false;

        progress = 0;
        frames = 0;
        obstacles = [];
        powerUps = [];
        floatingTexts = [];
        levelGateOpen = false;
        levelGate = null;

        winSfx.pause();
        winSfx.currentTime = 0;

        initLevel(1);
        updateLivesDisplay();

        currentState = STATE.PLAYING;
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        winScreen.classList.add('hidden');

        if (backgroundMusic.paused) {
            backgroundMusic.play().catch(() => {});
        }

        gameLoop();
    }

    function updateLivesDisplay() {
        let hearts = '';
        for (let i = 0; i < player.lives; i++) hearts += '❤️';
        livesDisplay.innerText = hearts;
    }

    function updateProgressBar() {
        const percent = Math.min(100, (progress / MAX_PROGRESS) * 100);
        progressBar.style.width = percent + '%';
    }

    function updateLogic() {
        if (currentState !== STATE.PLAYING) return;

        if (levelGateOpen) {
            player.update();
            player.draw();
            if (levelGate) {
                drawDoor(levelGate);
                if (checkCollision(player, levelGate)) {
                    advanceLevel();
                }
            }
            drawFloatingTexts();
            frames++;
            return;
        }

        progress += 5;
        updateProgressBar();

        const speedRate = Math.min(1, progress / MAX_PROGRESS);
        player.moveSpeed = PLAYER_SPEED_START + (PLAYER_SPEED_END - PLAYER_SPEED_START) * speedRate;

        if (progress >= MAX_PROGRESS) {
            if (currentLevel === 3) {
                triggerWinAnimation();
            } else {
                openLevelGate();
            }
            return;
        }

        if (frames % 250 === 0) {
            if (!healthPackSpawned && progress >= healthPackSpawnProgress) {
                powerUps.push(new PowerUp(2));
                healthPackSpawned = true;
            } else {
                powerUps.push(new PowerUp());
            }
        }

        let spawnRate = Math.max(50, 90 - Math.floor(progress / 500));
        if (currentLevel === 3) {
            if (frames % spawnRate === 0) obstacles.push(new Obstacle());
        } else {
            if (frames % spawnRate === 0) obstacles.push(new Obstacle());
        }

        const progressRate = Math.min(1, progress / MAX_PROGRESS);
        const speedCurve = Math.pow(progressRate, 1.15);
        const speedMultiplier = 1 + speedCurve * (0.85 + currentLevel * 0.25);
        const levelSpeedFactor = 1 + (currentLevel - 1) * 0.22;

        for (let i = obstacles.length - 1; i >= 0; i--) {
            const obs = obstacles[i];
            if (currentLevel === 3) {
                obs.speed = (obs.type === 'plane'
                    ? OBSTACLE_SPEED_BASE + OBSTACLE_FAST_BONUS
                    : OBSTACLE_SPEED_BASE + Math.random() * OBSTACLE_SPEED_VARIATION) * speedMultiplier * levelSpeedFactor;
            } else {
                obs.speed = (obs.type === 'shark' || obs.type === 'asteroid'
                    ? OBSTACLE_SPEED_BASE + OBSTACLE_FAST_BONUS
                    : OBSTACLE_SPEED_BASE + Math.random() * OBSTACLE_SPEED_VARIATION) * speedMultiplier * levelSpeedFactor;
            }

            obs.update();
            obs.draw();

            if (obs.type === 'alien' && obs.exploding) {
                if (obs.explodeLife <= 0) obstacles.splice(i, 1);
                continue;
            }

            if (checkCollision(player, obs)) {
                if (currentLevel === 1 && obs.type === 'shark') {
                    player.lives = 0;
                    updateLivesDisplay();
                    triggerLoseAnimation();
                    playLoseSfx();
                    if (!backgroundMusic.paused) backgroundMusic.pause();
                } else if (currentLevel === 2 && obs.type === 'asteroid') {
                    player.lives = 0;
                    updateLivesDisplay();
                    triggerLoseAnimation();
                    playLoseSfx();
                    if (!backgroundMusic.paused) backgroundMusic.pause();
                } else if (currentLevel === 3 && obs.type === 'plane') {
                    player.lives = 0;
                    updateLivesDisplay();
                    triggerLoseAnimation();
                    playLoseSfx();
                    if (!backgroundMusic.paused) backgroundMusic.pause();
                } else {
                    player.hit();
                }
                obstacles.splice(i, 1);
                continue;
            }

            if (obs.x + obs.width < 0) obstacles.splice(i, 1);
        }

        for (let i = powerUps.length - 1; i >= 0; i--) {
            const pUp = powerUps[i];
            pUp.update();
            pUp.draw();

            if (checkCircleCollision(player, { x: pUp.x, y: pUp.y, radius: pUp.radius })) {
                if (pUp.type === 0) {
                    progress += 800;
                    createFloatingText('+速度!', pUp.x, pUp.y, '#ff9900');
                } else if (pUp.type === 1) {
                    player.hasShield = true;
                    createFloatingText('获得护盾!', pUp.x, pUp.y, '#00cc44');
                } else if (pUp.type === 2) {
                    if (player.lives < 3) {
                        player.lives++;
                        updateLivesDisplay();
                        createFloatingText('+生命!', pUp.x, pUp.y, '#00ff00');
                    } else {
                        createFloatingText('生命已满!', pUp.x, pUp.y, '#ffcc00');
                    }
                }
                powerUps.splice(i, 1);
                continue;
            }

            if (pUp.x + pUp.radius < 0) powerUps.splice(i, 1);
        }

        player.update();
        player.draw();

        if (levelGateOpen && levelGate) {
            drawDoor(levelGate);
            if (checkCollision(player, levelGate)) {
                advanceLevel();
                drawFloatingTexts();
                frames++;
                return;
            }
        }

        drawFloatingTexts();
        frames++;
    }

    function gameLoop(currentTime) {
        if (currentState === STATE.START || currentState === STATE.UI_GAMEOVER || currentState === STATE.UI_WIN) return;

        if (!lastTime) lastTime = currentTime;
        const deltaTime = currentTime - lastTime;

        if (deltaTime >= FRAME_TIME) {
            lastTime = currentTime - (deltaTime % FRAME_TIME);
            drawBackground();

            if (currentState === STATE.PLAYING) {
                updateLogic();
            } else if (currentState === STATE.ANIM_WIN) {
                updateWinAnimation();
                drawWinAnimation();
                drawFloatingTexts();
            } else if (currentState === STATE.ANIM_LOSE) {
                for (const obs of obstacles) obs.draw();
                updateLoseAnimation();
                drawLoseAnimation();
            }
        }

        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.key)) {
            keys[e.key] = true;
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].indexOf(e.key) > -1) e.preventDefault();
        }
        if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true;
    });

    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false;
    });

    document.getElementById('start-btn').addEventListener('click', initGame);
    document.getElementById('restart-btn-lose').addEventListener('click', initGame);
    document.getElementById('restart-btn-win').addEventListener('click', initGame);

    ctx.font = '30px Arial';
    ctx.fillStyle = '#666';
    ctx.fillText('等待开始...', canvas.width / 2 - 80, canvas.height / 2);
    renderEnemyOverview();
    renderRewardOverview();
</script>
</body>
